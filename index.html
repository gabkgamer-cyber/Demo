<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<!-- FIX AUTO ZOOM MOBILE -->
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>GGFliy TV VIP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
touch-action:manipulation;
}

body{
font-family:'Poppins',sans-serif;
background:#050816;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#0066ff55,transparent 35%),
radial-gradient(circle at bottom right,#00ccff33,transparent 30%),
#050816;
z-index:-1;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:999;
padding:15px;
backdrop-filter:blur(25px);
background:rgba(10,15,35,.55);
border-bottom:1px solid rgba(255,255,255,.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:700;
background:linear-gradient(90deg,#00aeff,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.theme-btn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.08);
color:white;
font-size:20px;
backdrop-filter:blur(20px);
cursor:pointer;
}

/* PLAYER */

.player-wrap{
padding:14px;
}

.player-box{
position:relative;
overflow:hidden;
border-radius:28px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
box-shadow:
0 0 25px #008cff44,
0 0 80px #0066ff22;
}

video{
width:100%;
height:220px;
background:black;
display:block;
outline:none;
border:none;
}

/* LIVE BADGE */

.live{
position:absolute;
top:12px;
left:12px;
padding:6px 14px;
border-radius:999px;
background:red;
font-size:12px;
font-weight:700;
animation:pulse 1s infinite;
z-index:5;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* SEARCH */

.search-wrap{
padding:0 14px 12px;
}

.search{
width:100%;
padding:15px 18px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.08);
}

.search::placeholder{
color:#cfcfcf;
}

/* CATEGORY */

.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:0 14px 15px;
scrollbar-width:none;
}

.categories::-webkit-scrollbar{
display:none;
}

.categories button{
flex:none;
border:none;
padding:11px 20px;
border-radius:999px;
background:rgba(255,255,255,.08);
color:white;
font-weight:600;
cursor:pointer;
transition:.25s;
}

.categories button.active{
background:linear-gradient(90deg,#0099ff,#0055ff);
box-shadow:0 0 20px #008cff88;
}

/* CHANNELS */

.channels{
padding:0 14px 100px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
position:relative;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
overflow:hidden;
backdrop-filter:blur(20px);
transition:.2s;
cursor:pointer;
user-select:none;
}

.card:active{
transform:scale(.96);
}

.card img{
width:100%;
height:110px;
object-fit:cover;
display:block;
pointer-events:none;
}

.channel-name{
padding:12px;
font-size:14px;
font-weight:600;
}

/* LOADING */

.loader{
position:fixed;
inset:0;
background:#050816;
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
transition:.4s;
}

.loader-circle{
width:70px;
height:70px;
border-radius:50%;
border:5px solid rgba(255,255,255,.1);
border-top:5px solid #00aaff;
animation:spin .8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* STATUS */

.status{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:14px;
background:rgba(0,0,0,.75);
backdrop-filter:blur(20px);
font-size:14px;
display:none;
z-index:9999;
}

/* LIGHT MODE */

.light{
background:#f5f8ff;
color:#111;
}

.light .header,
.light .player-box,
.light .card,
.light .search,
.light .categories button{
background:rgba(255,255,255,.7);
color:#111;
}

.light .search::placeholder{
color:#555;
}

</style>
</head>
<body>

<div class="bg"></div>

<!-- LOADER -->
<div class="loader" id="loader">
<div class="loader-circle"></div>
</div>

<!-- HEADER -->
<div class="header">

<div class="logo">
GGFliy TV VIP
</div>

<button class="theme-btn"
id="themeBtn">
🌙
</button>

</div>

<!-- PLAYER -->
<div class="player-wrap">

<div class="player-box">

<div class="live">
LIVE
</div>

<video
id="video"
controls
autoplay
playsinline
webkit-playsinline>
</video>

</div>

</div>

<!-- SEARCH -->
<div class="search-wrap">

<input
type="text"
class="search"
id="searchInput"
placeholder="Search channels...">

</div>

<!-- CATEGORY -->
<div class="categories"
id="categories">
</div>

<!-- CHANNELS -->
<div class="channels"
id="channels">
</div>

<!-- STATUS -->
<div class="status"
id="status">
Loading...
</div>

<script src="script.js"></script>

</body>
</html>

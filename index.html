<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<meta name="theme-color" content="#020617">

<title>GGFliy TV VIP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{

background:
radial-gradient(circle at top,
#1e3a8a 0%,
#020617 35%,
#000 100%);

background-attachment:fixed;

color:white;
overflow-x:hidden;
min-height:100vh;
transition:.4s;

}

/* SMOOTH */

*,
*::before,
*::after{
transition:
background .3s,
color .3s,
border .3s,
transform .3s;
}

/* PREMIUM SCROLLBAR */

::-webkit-scrollbar{
width:4px;
height:4px;
}

::-webkit-scrollbar-thumb{
background:#3b82f6;
border-radius:20px;
}

/* PREMIUM LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;

background:
radial-gradient(circle at top,
#1d4ed8 0%,
#050816 40%,
#000 100%);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:999999;

transition:1s ease;

backdrop-filter:blur(20px);
}

.loading-orb{
position:absolute;
border-radius:50%;
filter:blur(50px);
opacity:.5;
animation:orbFloat 10s ease-in-out infinite;
}

.orb1{
width:220px;
height:220px;
background:#2563eb;
top:-60px;
left:-60px;
}

.orb2{
width:180px;
height:180px;
background:#60a5fa;
bottom:-50px;
right:-50px;
animation-delay:2s;
}

@keyframes orbFloat{

0%,100%{
transform:
translateY(0)
translateX(0);
}

50%{
transform:
translateY(-25px)
translateX(15px);
}

}

#loading::before{
content:'';
position:absolute;
width:500px;
height:500px;

background:
radial-gradient(circle,
rgba(59,130,246,.35),
transparent 70%);

filter:blur(40px);

animation:rotateGlow 8s linear infinite;
}

#loading::after{
content:'';
position:absolute;
inset:0;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,.03),
transparent
);

animation:shine 4s linear infinite;
}

/* PARTICLES */

.particles{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.particles span{
position:absolute;
display:block;
width:6px;
height:6px;
background:rgba(255,255,255,.7);
border-radius:50%;
animation:particleMove linear infinite;
}

/* LOGO */

.gg-logo{
position:relative;

width:140px;
height:140px;

border-radius:35px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.12),
rgba(255,255,255,.03)
);

backdrop-filter:blur(25px);

display:flex;
justify-content:center;
align-items:center;

font-size:40px;
font-weight:800;
letter-spacing:2px;
color:white;

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 30px rgba(59,130,246,.5),
0 0 60px rgba(59,130,246,.25),
inset 0 0 20px rgba(255,255,255,.06);

animation:
floatLogo 3s ease-in-out infinite;

overflow:hidden;
}

.gg-logo::before{
content:'';
position:absolute;
inset:-3px;
border-radius:38px;
padding:2px;

background:
linear-gradient(
45deg,
#3b82f6,
white,
#3b82f6,
black
);

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

animation:spinBorder 4s linear infinite;
}

.gg-logo::after{
content:'';
position:absolute;
top:-120%;
left:-40%;
width:70px;
height:320%;

background:
linear-gradient(
180deg,
transparent,
rgba(255,255,255,.7),
transparent
);

transform:rotate(25deg);

animation:logoShine 3s linear infinite;
}

@keyframes logoShine{

100%{
top:120%;
left:120%;
}

}

/* LOADING TEXT */

.loading-text{
margin-top:22px;
font-size:16px;
font-weight:700;
letter-spacing:5px;
color:#dbeafe;

text-shadow:
0 0 12px rgba(96,165,250,.8),
0 0 25px rgba(59,130,246,.5);

animation:flicker 2s infinite;
}

/* LOADING BAR */

.loading-bar{
position:relative;
width:240px;
height:10px;
margin-top:25px;
border-radius:30px;
overflow:hidden;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 30px rgba(37,99,235,.3),
inset 0 0 10px rgba(255,255,255,.08);
}

.loading-fill{
position:absolute;
top:0;
left:0;
height:100%;
width:0%;
border-radius:30px;

background:
linear-gradient(
90deg,
#2563eb,
white,
#2563eb
);

box-shadow:
0 0 20px #3b82f6,
0 0 40px rgba(59,130,246,.6);

animation:
premiumLoad 3s ease forwards,
pulseBar 1.5s infinite;
}

@keyframes pulseBar{

0%,100%{
filter:brightness(1);
}

50%{
filter:brightness(1.3);
}

}

/* PERCENT */

.loading-percent{
margin-top:14px;
font-size:13px;
font-weight:600;
letter-spacing:3px;
color:#93c5fd;
}

/* ANIMATION */

@keyframes premiumLoad{
100%{
width:100%;
}
}

@keyframes rotateGlow{
100%{
transform:rotate(360deg);
}
}

@keyframes floatLogo{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

@keyframes spinBorder{
100%{
transform:rotate(360deg);
}
}

@keyframes flicker{
0%,100%{
opacity:1;
}
50%{
opacity:.7;
}
}

@keyframes shine{
0%{
transform:translateX(-100%);
}
100%{
transform:translateX(100%);
}
}

@keyframes particleMove{

0%{
transform:translateY(100vh) scale(0);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(-120px) scale(1);
opacity:0;
}

}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-280px;
width:260px;
height:100%;

background:
rgba(8,15,35,.96);

backdrop-filter:blur(30px);

z-index:99999;

padding:20px;

transition:.4s;

border-right:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 40px rgba(0,0,0,.5);
}

.sidebar.active{
left:0;
}

.sidebar h2{
font-size:24px;
margin-bottom:30px;
color:#60a5fa;
font-weight:700;
}

.sidebar-item{
padding:16px;
border-radius:20px;

background:rgba(255,255,255,.06);

margin-bottom:15px;

cursor:pointer;

transition:.3s;

border:1px solid rgba(255,255,255,.06);

backdrop-filter:blur(20px);
}

.sidebar-item:hover{

background:rgba(77,163,255,.15);

transform:translateX(5px);

box-shadow:
0 0 20px rgba(59,130,246,.25);

}

.sidebar-number{
margin-top:15px;
font-size:15px;
color:#9ec9ff;
line-height:1.8;
}

/* OVERLAY */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
top:0;
left:0;
z-index:9999;
display:none;
backdrop-filter:blur(4px);
}

.overlay.active{
display:block;
}

/* APP */

.app{
padding:16px;
animation:premiumEntrance 1s ease;
}

@keyframes premiumEntrance{

0%{
opacity:0;
transform:
translateY(30px)
scale(.98);
filter:blur(10px);
}

100%{
opacity:1;
transform:
translateY(0)
scale(1);
filter:blur(0);
}

}

/* VIP BANNER */

.vip-banner{
position:relative;
width:100%;
padding:18px;
border-radius:28px;
margin-bottom:20px;

background:
linear-gradient(
135deg,
rgba(37,99,235,.25),
rgba(255,255,255,.05)
);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(30px);

overflow:hidden;

box-shadow:
0 0 50px rgba(37,99,235,.18);
}

.vip-banner::before{
content:'';
position:absolute;
top:-80px;
right:-80px;
width:180px;
height:180px;

background:
radial-gradient(circle,
rgba(96,165,250,.5),
transparent 70%);

filter:blur(10px);
}

.vip-top{
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
z-index:2;
}

.vip-text h1{
font-size:27px;
font-weight:700;
margin-bottom:6px;
}

.vip-text p{
font-size:13px;
color:#cbd5e1;
}

.vip-badge{
padding:10px 18px;
border-radius:18px;
font-size:13px;
font-weight:700;
letter-spacing:3px;

background:
linear-gradient(
90deg,
#2563eb,
#60a5fa
);

box-shadow:
0 0 25px rgba(37,99,235,.45);

animation:vipPulse 2s infinite;
}

@keyframes vipPulse{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
padding:8px 0;
}

.left-header{
display:flex;
align-items:center;
gap:12px;
}

.menu-btn{
width:50px;
height:50px;
border-radius:16px;

background:rgba(255,255,255,.08);

display:flex;
justify-content:center;
align-items:center;

font-size:24px;

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

cursor:pointer;

transition:.3s;
}

.menu-btn:hover{

transform:scale(1.05);

box-shadow:
0 0 20px rgba(59,130,246,.3);

}

.title{
font-size:34px;
font-weight:800;

background:
linear-gradient(
90deg,
#60a5fa,
white
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 25px rgba(96,165,250,.35);
}

.theme-toggle{
width:50px;
height:50px;
border-radius:50%;

background:rgba(255,255,255,.08);

display:flex;
justify-content:center;
align-items:center;

font-size:22px;

backdrop-filter:blur(20px);

cursor:pointer;

border:1px solid rgba(255,255,255,.08);

transition:.3s;
}

.theme-toggle:hover{
transform:rotate(180deg);
}

/* STATS */

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(110px,1fr));

gap:12px;
margin-bottom:20px;
}

.stat-box{
padding:16px;
border-radius:22px;

background:
rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

text-align:center;

box-shadow:
0 0 20px rgba(37,99,235,.08);

transition:.35s;
}

.stat-box:hover{

transform:
translateY(-5px)
scale(1.03);

box-shadow:
0 0 25px rgba(37,99,235,.2);

}

.stat-box h3{
font-size:20px;
margin-bottom:5px;
color:#60a5fa;
}

.stat-box p{
font-size:11px;
color:#cbd5e1;
}

/* PLAYER */

.player-box{
position:relative;
width:100%;
overflow:hidden;
border-radius:30px;

background:
rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(96,165,250,.18);

box-shadow:
0 0 60px rgba(37,99,235,.22),
0 0 120px rgba(37,99,235,.08);

margin-bottom:22px;
}

.player-box::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;

background:
linear-gradient(
180deg,
rgba(255,255,255,.08),
transparent 30%,
transparent 70%,
rgba(0,0,0,.4)
);
}

video{
width:100%;
height:250px;
background:black;
outline:none;
object-fit:cover;
}

/* SEARCH */

.search-box{
margin-bottom:16px;
position:relative;
}

.search-box input{
width:100%;
padding:16px 18px;
border:none;
outline:none;
border-radius:20px;

background:
rgba(255,255,255,.06);

backdrop-filter:blur(20px);

color:white;
font-size:15px;

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 20px rgba(37,99,235,.08);
}

.search-box input:focus{

transform:scale(1.01);

border:1px solid
rgba(96,165,250,.45);

box-shadow:
0 0 25px rgba(37,99,235,.25);

}

.search-box input::placeholder{
color:#94a3b8;
}

/* CATEGORIES */

.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
margin-bottom:18px;
scrollbar-width:none;
}

.categories::-webkit-scrollbar{
display:none;
}

.category-btn{
border:none;
padding:12px 18px;
border-radius:18px;

background:rgba(255,255,255,.06);

color:white;

font-size:14px;
font-weight:600;

cursor:pointer;

transition:.3s;

white-space:nowrap;

border:1px solid rgba(255,255,255,.05);
}

.category-btn:hover{

transform:translateY(-2px);

box-shadow:
0 0 20px rgba(59,130,246,.3);

}

.category-btn.active{

background:
linear-gradient(
90deg,
#007bff,
#60a5fa
);

box-shadow:
0 0 20px rgba(0,123,255,.5);

}

/* CHANNELS */

.channels{
display:grid;

grid-template-columns:
repeat(auto-fill,minmax(160px,1fr));

gap:18px;

padding-bottom:50px;
}

.card{
position:relative;

background:
rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border-radius:28px;

padding:15px;

border:1px solid rgba(255,255,255,.08);

cursor:pointer;

transition:.35s;

overflow:hidden;

animation:floatCard 6s ease-in-out infinite;
}

.card:nth-child(2){
animation-delay:1s;
}

.card:nth-child(3){
animation-delay:2s;
}

@keyframes floatCard{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-4px);
}

}

.card::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
transparent
);

transition:.6s;
}

.card:hover::before{
left:100%;
}

.card:hover{

transform:
translateY(-8px)
scale(1.03);

border:
1px solid rgba(96,165,250,.25);

box-shadow:
0 0 40px rgba(37,99,235,.35);

}

.logo{
width:100%;
height:90px;
object-fit:contain;

background:white;

border-radius:20px;

padding:8px;

margin-bottom:10px;

transition:.35s;
}

.card:hover .logo{
transform:scale(1.05);
}

.info h3{
font-size:15px;
margin-bottom:5px;
font-weight:600;
}

.info p{
font-size:12px;
color:#9dc6ff;
}

.live-badge{
position:absolute;
top:12px;
right:12px;

background:
linear-gradient(
90deg,
#ef4444,
#dc2626
);

padding:5px 10px;
border-radius:20px;

font-size:10px;
font-weight:700;

box-shadow:
0 0 15px rgba(255,0,0,.6);

animation:liveBlink 1.2s infinite;
}

@keyframes liveBlink{

0%,100%{
opacity:1;
}

50%{
opacity:.65;
}

}

/* FULLSCREEN */

.full-btn{
position:absolute;
bottom:14px;
right:14px;

border:none;

padding:10px 14px;

border-radius:14px;

background:rgba(0,0,0,.55);

color:white;

cursor:pointer;

backdrop-filter:blur(12px);

transition:.3s;
}

.full-btn:hover{

transform:scale(1.08);

box-shadow:
0 0 25px rgba(59,130,246,.4);

}

/* LIGHT MODE */

body.light{
background:#eef4ff;
color:#111;
}

body.light .card,
body.light .player-box,
body.light .search-box input,
body.light .theme-toggle,
body.light .menu-btn,
body.light .category-btn,
body.light .vip-banner,
body.light .stat-box{
background:rgba(255,255,255,.78);
color:#111;
}

body.light .sidebar{
background:rgba(255,255,255,.94);
}

body.light .category-btn.active{
color:white;
}

body.light .info p{
color:#333;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:28px;
}

.vip-text h1{
font-size:21px;
}

video{
height:220px;
}

.channels{
grid-template-columns:
repeat(2,1fr);
}

}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="loading-orb orb1"></div>
<div class="loading-orb orb2"></div>

<div class="particles">

<span style="left:10%;animation-duration:7s;"></span>
<span style="left:20%;animation-duration:9s;"></span>
<span style="left:35%;animation-duration:6s;"></span>
<span style="left:50%;animation-duration:8s;"></span>
<span style="left:65%;animation-duration:7s;"></span>
<span style="left:80%;animation-duration:10s;"></span>
<span style="left:90%;animation-duration:6s;"></span>

</div>

GG
</div>

</div>

<div

>
0%
</div>

</div>

<!-- OVERLAY -->

<div

id="overlay"
onclick="closeSidebar()"
></div>

<!-- SIDEBAR -->

<div

id="sidebar"
>

<h2>GGFliy TV</h2>

onclick="openDonate()"
>

<div class="app">

<!-- VIP BANNER -->

</div>

</div>

</div>

</div>

<div class="header">

<p>Ultra HD</p>
</div>

<div class="stat-box">
<h3>VIP</h3>
<p>Premium Access</p>
</div>

<div class="stat-box">
<h3>LIVE</h3>
<p>Streaming</p>
</div>

<h3>NO ADS</h3>
<p>Enjoy your watching</p>
</div>

<script>

/* PREMIUM LOADING */

let percent = 0;

const percentText =
document.getElementById(
"percent"
);

const loading =
document.getElementById(
"loading"
);

const interval =
setInterval(()=>{

percent += Math.floor(
Math.random()*4
)+1;

if(percent > 100){
percent = 100;
}

percentText.innerHTML =
percent + "%";

if(percent >= 100){

clearInterval(interval);

setTimeout(()=>{

loading.style.opacity = "0";

loading.style.transform =
"scale(1.08)";

loading.style.filter =
"blur(20px)";

setTimeout(()=>{

loading.style.display =
"none";

},1200);

},700);

}

},45);

/* THEME */

const toggle =
document.getElementById(
"themeToggle"
);

toggle.onclick = ()=>{

document.body.classList.toggle(
"light"
);

if(
document.body.classList.contains(
"light"
)
){

toggle.innerHTML = "🌙";

}else{

toggle.innerHTML = "☀";

}

};

/* SIDEBAR */

function openSidebar(){

document
.getElementById(
"sidebar"
)
.classList.add("active");

document
.getElementById(
"overlay"
)
.classList.add("active");

}

function closeSidebar(){

document
.getElementById(
"sidebar"
)
.classList.remove("active");

document
.getElementById(
"overlay"
)
.classList.remove("active");

}

/* DONATE */

function openDonate(){

alert(
"Please mag donate ng load regular kahit di masyadong malaki basta't nakakatuwa lng sakin masaya na ako para sa aking pagod sa paggawa ng website na libre 😊\n\nNumber: 09515748063\n\nThank You ❤️"
);

}

/* FULLSCREEN */

function openFullscreen(){

const video =
document.getElementById(
"video"
);

if(video.requestFullscreen){

video.requestFullscreen();

}

}

/* PREMIUM CARD EFFECT */

document.addEventListener(
"mousemove",
(e)=>{

document.querySelectorAll(".card")
.forEach((card)=>{

const rect =
card.getBoundingClientRect();

const x =
e.clientX - rect.left;

const y =
e.clientY - rect.top;

if(
x > 0 &&
x < rect.width &&
y > 0 &&
y < rect.height
){

card.style.transform =
`
perspective(1000px)
rotateX(${-(y-rect.height/2)/18}deg)
rotateY(${(x-rect.width/2)/18}deg)
scale(1.03)
`;

}else{

card.style.transform =
`
perspective(1000px)
rotateX(0)
rotateY(0)
scale(1)
`;

}

});

});

/* PREMIUM SOUND */

document.addEventListener(
"click",
()=>{

const audio =
new Audio(
"https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8d09a8b2d.mp3?filename=interface-124464.mp3"
);

audio.volume = 0.08;

},
{once:true}
);

</script>

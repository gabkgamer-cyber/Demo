<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>GGFliy TV VIP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
180deg,
#030712,
#071129,
#0a1c40
);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
transition:.5s;
}

.gg-logo{
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:700;
color:#4da3ff;
border:2px solid rgba(77,163,255,.4);
box-shadow:
0 0 30px rgba(77,163,255,.4),
0 0 60px rgba(77,163,255,.2);
animation:pulse 2s infinite;
}

.loading-text{
margin-top:20px;
font-size:14px;
color:#8bbcff;
letter-spacing:3px;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

/* APP */

.app{
padding:16px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:700;
background:linear-gradient(
90deg,
#4da3ff,
#ffffff
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.theme-toggle{
width:50px;
height:50px;
border-radius:50%;
background:rgba(255,255,255,.08);
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
cursor:pointer;
}

/* PLAYER */

.player-box{
position:relative;
width:100%;
border-radius:25px;
overflow:hidden;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 0 30px rgba(0,140,255,.15);
margin-bottom:20px;
}

video{
width:100%;
height:230px;
background:black;
outline:none;
}

/* SEARCH */

.search-box{
margin-bottom:15px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,.07);
backdrop-filter:blur(20px);
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.08);
}

/* CATEGORIES */

.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
margin-bottom:18px;
scrollbar-width:none;
}

.categories::-webkit-scrollbar{
display:none;
}

.category-btn{
border:none;
padding:12px 18px;
border-radius:14px;
background:rgba(255,255,255,.07);
color:white;
font-size:14px;
font-weight:500;
backdrop-filter:blur(20px);
cursor:pointer;
transition:.3s;
white-space:nowrap;
}

.category-btn.active{
background:linear-gradient(
90deg,
#007bff,
#4da3ff
);
box-shadow:
0 0 20px rgba(0,123,255,.5);
}

/* CHANNELS */

.channels{
display:grid;
grid-template-columns:repeat(
auto-fill,
minmax(160px,1fr)
);
gap:15px;
padding-bottom:50px;
}

.card{
position:relative;
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border-radius:24px;
padding:15px;
border:1px solid rgba(255,255,255,.08);
cursor:pointer;
transition:.3s;
overflow:hidden;
}

.card:hover{
transform:translateY(-5px);
box-shadow:
0 0 30px rgba(0,123,255,.3);
}

.logo{
width:100%;
height:90px;
object-fit:contain;
border-radius:18px;
background:white;
padding:8px;
margin-bottom:10px;
}

.info h3{
font-size:15px;
margin-bottom:4px;
}

.info p{
font-size:12px;
color:#9bbcff;
}

.live-badge{
position:absolute;
top:12px;
right:12px;
background:red;
padding:4px 10px;
border-radius:20px;
font-size:10px;
font-weight:600;
box-shadow:
0 0 15px rgba(255,0,0,.5);
}

/* LIGHT MODE */

body.light{
background:#eef4ff;
color:#111;
}

body.light .card,
body.light .player-box,
body.light .search-box input,
body.light .theme-toggle,
body.light .category-btn{
background:rgba(255,255,255,.7);
color:#111;
}

body.light .info p{
color:#333;
}

body.light .category-btn.active{
color:white;
}

/* FULLSCREEN BUTTON */

.full-btn{
position:absolute;
bottom:15px;
right:15px;
background:rgba(0,0,0,.5);
border:none;
color:white;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
backdrop-filter:blur(10px);
}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="gg-logo">
GGFliy
</div>

<div class="loading-text">
LOADING GGFliy TV APP
</div>

</div>

<!-- APP -->

<div class="app">

<div class="header">

<div class="title">
GGFliy TV
</div>

<div
class="theme-toggle"
id="themeToggle"
>
B
</div>

</div>

<!-- PLAYER -->

<div class="player-box">

<video
id="video"
controls
autoplay
playsinline
></video>

<button
class="full-btn"
onclick="openFullscreen()"
>
⛶
</button>

</div>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search channels..."
>

</div>

<!-- CATEGORIES -->

<div
class="categories"
id="categories"
></div>

<!-- CHANNELS -->

<div
class="channels"
id="channels"
></div>

</div>

<script>

/* THEME */

const toggle =
document.getElementById(
"themeToggle"
);

toggle.onclick = ()=>{

document.body.classList.toggle(
"light"
);

if(
document.body.classList.contains(
"light"
)
){

toggle.innerHTML  = "B";

}else{

toggle.innerHTML = "W";

}

};

/* FULLSCREEN */

function openFullscreen(){

const video =
document.getElementById(
"video"
);

if(video.requestFullscreen){

video.requestFullscreen();

}

}

</script>

<script src="script.js"></script>

</body>
</html>

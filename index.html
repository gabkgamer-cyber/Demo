<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<meta name="theme-color" content="#020617">

<title>GGFliy TV VIP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>

:root{
--blue:#3b82f6;
--blue2:#60a5fa;
--gold:#facc15;
--white:#ffffff;
--black:#000000;
--dark:#020617;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{

background:
radial-gradient(circle at top left,#2563eb22 0%,transparent 25%),
radial-gradient(circle at top right,#facc1520 0%,transparent 20%),
linear-gradient(180deg,#020617 0%,#000000 100%);

background-attachment:fixed;

color:white;
overflow-x:hidden;
min-height:100vh;
transition:.4s;

}

/* SMOOTH */

*,
*::before,
*::after{
transition:
background .3s,
color .3s,
border .3s,
transform .3s,
box-shadow .3s,
opacity .3s;
}

/* SCROLL */

::-webkit-scrollbar{
width:5px;
height:5px;
}

::-webkit-scrollbar-thumb{
background:
linear-gradient(
180deg,
var(--blue),
var(--gold)
);

border-radius:20px;
}

/* LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle at top,#2563eb 0%,#020617 45%,#000 100%);

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

z-index:999999;

backdrop-filter:blur(30px);

transition:1s ease;
}

.loading-orb{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.6;
animation:orbFloat 10s ease-in-out infinite;
}

.orb1{
width:300px;
height:300px;
background:#2563eb;
top:-100px;
left:-100px;
}

.orb2{
width:250px;
height:250px;
background:#facc15;
bottom:-90px;
right:-90px;
animation-delay:2s;
}

.orb3{
width:200px;
height:200px;
background:#60a5fa;
top:40%;
left:40%;
animation-delay:4s;
}

@keyframes orbFloat{

0%,100%{
transform:
translateY(0)
translateX(0)
scale(1);
}

50%{
transform:
translateY(-30px)
translateX(20px)
scale(1.1);
}

}

#loading::before{
content:'';
position:absolute;
width:700px;
height:700px;

background:
radial-gradient(circle,
rgba(59,130,246,.25),
transparent 70%);

filter:blur(50px);

animation:rotateGlow 10s linear infinite;
}

@keyframes rotateGlow{
100%{
transform:rotate(360deg);
}
}

/* PARTICLES */

.particles{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.particles span{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;

box-shadow:
0 0 10px white,
0 0 20px #60a5fa;

animation:particleMove linear infinite;
}

@keyframes particleMove{

0%{
transform:
translateY(100vh)
scale(0);

opacity:0;
}

10%{
opacity:1;
}

100%{
transform:
translateY(-100px)
scale(1.2);

opacity:0;
}

}

/* LOGO */

.gg-logo{
position:relative;

width:165px;
height:165px;

border-radius:40px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.12),
rgba(255,255,255,.03)
);

backdrop-filter:blur(30px);

display:flex;
justify-content:center;
align-items:center;

font-size:48px;
font-weight:800;
letter-spacing:3px;

border:1px solid rgba(255,255,255,.15);

overflow:hidden;

box-shadow:
0 0 40px rgba(59,130,246,.5),
0 0 80px rgba(250,204,21,.2);

animation:floatLogo 3s ease-in-out infinite;
}

.gg-logo::before{
content:'';
position:absolute;
inset:-2px;
border-radius:42px;

padding:2px;

background:
linear-gradient(
45deg,
#3b82f6,
#ffffff,
#facc15,
#3b82f6
);

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

animation:spinBorder 5s linear infinite;
}

@keyframes spinBorder{
100%{
transform:rotate(360deg);
}
}

@keyframes floatLogo{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

.loading-text{
margin-top:24px;

font-size:17px;
font-weight:700;
letter-spacing:6px;

text-shadow:
0 0 15px rgba(96,165,250,.8),
0 0 25px rgba(250,204,21,.4);

animation:flicker 2s infinite;
}

@keyframes flicker{

0%,100%{
opacity:1;
}

50%{
opacity:.75;
}

}

.loading-bar{
position:relative;

width:280px;
height:12px;

margin-top:24px;

border-radius:30px;
overflow:hidden;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);
}

.loading-fill{
position:absolute;
top:0;
left:0;

height:100%;
width:0%;

border-radius:30px;

background:
linear-gradient(
90deg,
#2563eb,
white,
#facc15,
#2563eb
);

background-size:300% 100%;

animation:
premiumLoad 4s ease forwards,
gradientMove 4s linear infinite;
}

@keyframes premiumLoad{
100%{
width:100%;
}
}

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

.loading-percent{
margin-top:15px;
font-size:13px;
font-weight:700;
letter-spacing:4px;
color:#dbeafe;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-280px;

width:260px;
height:100%;

background:
rgba(8,15,35,.95);

backdrop-filter:blur(35px);

z-index:99999;

padding:20px;

border-right:1px solid rgba(255,255,255,.08);

transition:.4s;
}

.sidebar.active{
left:0;
}

.sidebar h2{
font-size:24px;
margin-bottom:25px;
color:#60a5fa;
}

.sidebar-item{
padding:16px;
border-radius:22px;

background:rgba(255,255,255,.06);

margin-bottom:15px;

cursor:pointer;

border:1px solid rgba(255,255,255,.08);
}

.sidebar-item:hover{

transform:translateX(5px);

background:rgba(59,130,246,.15);

box-shadow:
0 0 25px rgba(59,130,246,.25);

}

.sidebar-number{
margin-top:15px;
color:#dbeafe;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.65);

backdrop-filter:blur(6px);

z-index:9999;

display:none;
}

.overlay.active{
display:block;
}

/* APP */

.app{
padding:16px;
animation:appEnter 1s ease;
}

@keyframes appEnter{

0%{
opacity:0;
transform:
translateY(20px)
scale(.98);
}

100%{
opacity:1;
transform:
translateY(0)
scale(1);
}

}

/* VIP */

.vip-banner{
position:relative;

padding:22px;

border-radius:30px;

margin-bottom:20px;

overflow:hidden;

background:
linear-gradient(
135deg,
rgba(37,99,235,.25),
rgba(250,204,21,.08)
);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(30px);

box-shadow:
0 0 60px rgba(37,99,235,.18);
}

.vip-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.vip-text h1{
font-size:28px;
margin-bottom:5px;
}

.vip-text p{
font-size:13px;
color:#dbeafe;
}

.vip-badge{
padding:10px 20px;

border-radius:20px;

background:
linear-gradient(
90deg,
#2563eb,
#facc15
);

font-size:13px;
font-weight:700;

color:black;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:20px;
}

.left-header{
display:flex;
align-items:center;
gap:12px;
}

.menu-btn,
.theme-toggle{
width:52px;
height:52px;

border-radius:18px;

background:rgba(255,255,255,.08);

display:flex;
justify-content:center;
align-items:center;

font-size:24px;

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

cursor:pointer;
}

.title{
font-size:34px;
font-weight:800;

background:
linear-gradient(
90deg,
#60a5fa,
white,
#facc15
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* PLAYER */

.player-box{
position:relative;

width:100%;
overflow:hidden;

border-radius:30px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.08);

margin-bottom:20px;
}

video{
width:100%;
height:250px;
background:black;
outline:none;
object-fit:cover;
}

.full-btn{
position:absolute;
bottom:14px;
right:14px;

border:none;

padding:10px 14px;

border-radius:14px;

background:rgba(0,0,0,.55);

color:white;

cursor:pointer;
}

/* SEARCH */

.search-box{
margin-bottom:18px;
}

.search-box input{
width:100%;

padding:16px 18px;

border:none;
outline:none;

border-radius:22px;

background:rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

color:white;
font-size:15px;
}

/* CATEGORIES */

.categories{
display:flex;
gap:12px;

overflow-x:auto;

padding-bottom:10px;
margin-bottom:20px;

scrollbar-width:none;
}

.categories::-webkit-scrollbar{
display:none;
}

/* CHANNELS */

.channels{
display:grid;

grid-template-columns:
repeat(auto-fill,minmax(160px,1fr));

gap:18px;

padding-bottom:50px;
}

.card{
position:relative;

background:rgba(255,255,255,.06);

backdrop-filter:blur(20px);

border-radius:28px;

padding:15px;

border:1px solid rgba(255,255,255,.08);

cursor:pointer;

overflow:hidden;
}

.logo{
width:100%;
height:90px;

object-fit:contain;

background:white;

border-radius:20px;

padding:8px;

margin-bottom:10px;
}

.info h3{
font-size:15px;
margin-bottom:5px;
}

.info p{
font-size:12px;
color:#dbeafe;
}

.live-badge{
position:absolute;
top:12px;
right:12px;

padding:5px 10px;

border-radius:20px;

font-size:10px;
font-weight:700;

background:
linear-gradient(
90deg,
#ef4444,
#facc15
);

color:black;
}

/* MOBILE */

@media(max-width:768px){

.title{
font-size:28px;
}

.vip-text h1{
font-size:22px;
}

video{
height:220px;
}

.channels{
grid-template-columns:
repeat(2,1fr);
}

.gg-logo{
width:145px;
height:145px;
font-size:42px;
}

}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="loading-orb orb1"></div>
<div class="loading-orb orb2"></div>
<div class="loading-orb orb3"></div>

<div class="particles">

<span style="left:10%;animation-duration:7s;"></span>
<span style="left:20%;animation-duration:9s;"></span>
<span style="left:35%;animation-duration:6s;"></span>
<span style="left:50%;animation-duration:8s;"></span>
<span style="left:65%;animation-duration:7s;"></span>
<span style="left:80%;animation-duration:10s;"></span>
<span style="left:90%;animation-duration:6s;"></span>

</div>

<div class="gg-logo">
GG
</div>

GGFLIY TV VIP
</div>

<div class="loading-bar">
<div class="loading-fill"></div>
</div>

<div class="loading-percent" id="percent">
0%
</div>

</div>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h2>GGFliy TV</h2>

<div class="sidebar-item" onclick="openDonate()">
💸 Donation
</div>

<div class="sidebar-number">
📱 09515748063
</div>

</div>

<!-- APP -->

<div class="app">

<div class="vip-banner">

<div class="vip-top">

<div class="vip-text">
<h1>Welcome to GGFliy TV VIP</h1>
<p>Ultra Premium • 4K Streaming • No Ads Experience</p>
</div>

<div class="vip-badge">
VIP
</div>

</div>

</div>

<div class="header">

<div class="left-header">

<div class="menu-btn" onclick="openSidebar()">
☰
</div>

<div class="title">
GGFliy TV
</div>

</div>

<div class="theme-toggle" id="themeToggle">
☀
</div>

</div>

<div class="player-box">

<video
id="video"
controls
autoplay
playsinline
></video>

<button
class="full-btn"
onclick="openFullscreen()"
>
⛶
</button>

</div>

<input
type="text"
id="search"
placeholder="Search premium channels..."
>

</div>

<div class="categories" id="categories"></div>

<div class="channels" id="channels"></div>

</div>

<script>

/* LOADING */

let percent = 0;

const percentText =
document.getElementById("percent");

const loading =
document.getElementById("loading");

const interval =
setInterval(()=>{

percent += Math.floor(Math.random()*3)+1;

if(percent > 100){
percent = 100;
}

percentText.innerHTML =
percent + "%";

if(percent >= 100){

clearInterval(interval);

setTimeout(()=>{

loading.style.opacity = "0";

loading.style.transform =
"scale(1.1)";

loading.style.filter =
"blur(30px)";

setTimeout(()=>{

loading.style.display =
"none";

},1400);

},900);

}

},55);

/* THEME */

const toggle =
document.getElementById("themeToggle");

toggle.onclick = ()=>{

document.body.classList.toggle("light");

if(
document.body.classList.contains("light")
){

toggle.innerHTML = "🌙";

}else{

toggle.innerHTML = "☀";

}

};

/* SIDEBAR */

function openSidebar(){

document
.getElementById("sidebar")
.classList.add("active");

document
.getElementById("overlay")
.classList.add("active");

}

function closeSidebar(){

document
.getElementById("sidebar")
.classList.remove("active");

document
.getElementById("overlay")
.classList.remove("active");

}

/* DONATE */

function openDonate(){

alert(
"Please mag donate ng load regular kahit di masyadong malaki 😊\n\n09515748063\n\nThank You ❤️"
);

}

/* FULLSCREEN */

function openFullscreen(){

const video =
document.getElementById("video");

if(video.requestFullscreen){

video.requestFullscreen();

}

}

/* FIX CHANNELS */

window.addEventListener(
"DOMContentLoaded",
()=>{

if(typeof renderChannels === "function"){

renderChannels();

}

});

</script>
